on:
  workflow_dispatch:
  push:
    branches: main
  schedule:
    # 2-3 daytime updates (UTC times - adjust to your timezone)
    - cron: '0 3 * * *'       # 5:00 AM CET
    - cron: '0 10 * * *'      # 12:00 PM CET
    - cron: '0 13 * * *'      # 3:00 PM CET

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::quarto
            any::knitr
            any::rmarkdown
            any::jsonlite
            any::httr2
            any::dplyr
            any::gh

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Publish index.qmd
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: index.qmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

